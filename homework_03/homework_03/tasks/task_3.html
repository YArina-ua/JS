<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>task_3</title>
    </head>
    <body>
        <script>
            // Крок 0. Вводимо позначення:

			// Randomly number min 1 = firstNumber;
            // Randomly number max 5= lastNumber ;
			

			// Крок 1. Введення величин:

                const firstNumber = 1
                const lastNumber = 5

                const randomNumber = Math.floor(Math.random() * (lastNumber - firstNumber + 1) + firstNumber)

                let firstGuess = parseInt(prompt('Enter your number, please', '5'))
                
                // Крок 2. Розв'язання задачі:

                if (firstGuess === randomNumber) {
                  alert(`Congratulations, you won!!! The number is: ${randomNumber}`)
                } else {
                  let secondGuess = parseInt(prompt('Enter your number again, please', '3'))

                  if (secondGuess === randomNumber) {
                    alert(`You are lucky!!! The number is: ${randomNumber}`)
                  }
                  else
                    alert(`You lost!!! The number is: ${randomNumber}`)
                }

        </script>
    </body>
</html>
