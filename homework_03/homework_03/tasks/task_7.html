<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>task_7</title>
    </head>
    <body>
        <script>

                let monthNumber = parseInt(prompt('Enter the month of year,please', '1'))

                if (monthNumber === 12 || monthNumber === 1 || monthNumber === 2)
                  document.write('This is Winter!')
                else if (monthNumber === 3 || monthNumber === 4 || monthNumber === 5)
                  document.write('This is Spring!')
                else if (monthNumber === 6 || monthNumber === 7 || monthNumber === 8)
                  document.write('This is Summer!')
                else if (monthNumber === 9 || monthNumber === 10 || monthNumber === 11)
                  document.write('This is Autumn!')
                else
                  alert('This period of year does not exist!!!')
       </script>
    </body>
</html>
