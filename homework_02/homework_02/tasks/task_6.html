        let sumSecondPrice = firstCost * firstQuantity;
        let sumThirdPrice = firstCost * firstQuantity;
        let totalSum = sumFirstPrice + sumSecondPrice * sumThirdPrice;
        document.write(`

            <table>

                    <tr>
                        <td>RIO green peas 420ml</td>
                        <td>${firstCost}</td>
