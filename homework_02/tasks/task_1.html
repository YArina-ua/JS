<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>task_1</title>
	</head>
	<body>
		<script>
            let a = parseFloat(prompt(`Enter value "а":`, 39));
		    let b = parseFloat(prompt(`Enter value "b":`, 3));
		    let sumNumb = a + b;
            let miltNumb = a * b;
            let divNumb = a / b;
		   document.write(`
			<table>
				<tr>
					<td>Sum of results:</td>
					<td>${sumNumb}</td>
				</tr>
				<tr>
					<td>Multiplication result:</td>
					<td>${miltNumb}</td>
				</tr>
				<tr>
					<td>Dividing the result:</td>
					<td>${divNumb}</td>
				</tr>
			</table>
		`);
   </script>
	</body>
</html>
