<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>task_7</title>
    </head>
    <body>
        <script>
        let month = Math.floor(Math.random()* 12 + 1);
        let day = Math.floor(Math.random() * 7 + 1);
        let sum = month + day;
        document.write(`
        <ul>
            <li>Month: ${month}</li>
            <li>Day: ${day}</li>
            <li>Sum: ${sum}</li>
        </ul>
        `)
    </script>
    </body>
</html>
